        /* A4 Container */
        .page {
            width: 210mm;
            min-height: 297mm;
            padding: 0;
            margin: 20px auto;
            background: white;
            position: relative;
        }

        /* Table layout is safer for Word copy-paste than Flexbox */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* Header Section */

            padding: 40px 50px 20px 50px;
            /* Top, Right, Bottom, Left */
            border-bottom: 3px solid #3b82f6;
            /* GSI Blue */

        .logo-cell {

            width: 120px;

        .company-info-cell {

            padding-left: 15px;

        .company-name {
            font-size: 36px;
            /* Increased from 24px */
            font-weight: bold;
            color: #111827;
            margin: 0;
            line-height: 1.2;
        }

        .company-tagline {
            font-size: 16px;
            /* Increased from 11px */
            font-weight: 500;
            color: #4b5563;
            /* Darker for visibility */
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0 0 0;

        .contact-info-cell {

            vertical-align: middle;
            font-size: 14px;
            /* Increased from 11px */
            color: #1f2937;
            /* Darker for visibility */

            white-space: nowrap;

        /* Body Section */

            height: 600px;

        /* Footer Section */

            /* Thicker border */
            color: #6b7280;

        .footer-left {

        }

        .footer-right {
