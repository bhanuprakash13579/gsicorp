<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — GSI Corp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1c;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .code { font-size: 6rem; font-weight: 800; color: #3b82f6; line-height: 1; }
    .title { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <div class="title">Page not found</div>
    <div class="subtitle">The page you're looking for doesn't exist.</div>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
