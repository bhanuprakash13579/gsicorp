<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSI Technologies - Visiting Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #e5e7eb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 40px;
        }

        h2 {
            display: none;
            /* Hide headers since there's only one card */
        }

        .card {
            width: 3.5in;
            height: 2in;
            background: #0a0f1c;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 24px 28px;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Front Card */
        .card-front {
            justify-content: space-between;
        }

        .card-left {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100%;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            /* Space between logo and text */
            margin-left: -5px;
            /* Correct visual skew alignment */
        }

        .logo-container svg {
            width: 90px;
            height: auto;
        }

        .company-name {
            color: #f9fafb;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-left: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
            /* Space between GSI and Technologies */
        }

        .gsi-stylish {
            font-weight: 800;
            font-size: 1.2em;
            /* Slightly larger */
            background: linear-gradient(135deg, #3b82f6 0%, #ffffff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
        }

        .tagline {
            color: #9ca3af;
            font-size: 9px;
            margin-top: 6px;
            margin-left: 2px;
        }

        .card-right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            text-align: right;
        }

        .name {
            color: #f9fafb;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            color: #d1d5db;
            font-size: 10px;
        }

        .contact-item svg {
            width: 12px;
            height: 12px;
            color: #3b82f6;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <h2>Front Side</h2>
    <div class="card card-front">
        <div class="card-left">
            <div class="logo-container">
                <!-- Your actual GSI Logo -->
                <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <g transform="skewX(-15) translate(100, 0)">
                        <path d="M450 140 H100 A40 40 0 0 0 60 180 V320 A40 40 0 0 0 100 360 H160 V260" stroke="#3b82f6"
                            stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                        <path
                            d="M350 220 H260 A40 40 0 0 0 220 260 V260 A40 40 0 0 0 260 300 H310 A40 40 0 0 1 350 340 V380 A40 40 0 0 1 310 420 H60"
                            stroke="#94a3b8" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"
                            fill="none" />
                        <path d="M420 220 V420" stroke="#3b82f6" stroke-width="40" stroke-linecap="round" />
                    </g>
                </svg>
            </div>
            <span class="company-name"><span class="gsi-stylish">GSI</span> Technologies</span>
            <span class="tagline">Web & Mobile App Development</span>
        </div>
        <div class="card-right">
            <div class="name">Bhanu Prakash</div>
            <div class="contact-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                </svg>
                <span>+91 7997860051</span>
            </div>
            <div class="contact-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                    <polyline points="22,6 12,13 2,6" />
                </svg>
                <span>contact@gsicorp.in</span>
            </div>
            <div class="contact-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                </svg>
                <span>www.gsicorp.in</span>
            </div>
        </div>
    </div>

    <p class="print-note" style="color: #6b7280; font-size: 12px; text-align: center; margin-top: 20px;">
        To print: Take a screenshot, or use browser Print (Ctrl+P) → Save as PDF<br>
        Card size: 3.5" × 2" (standard business card)
    </p>
</body>

</html>
